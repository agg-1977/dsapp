<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload New Ad</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Upload Display Ad</h2>
        
        <label for="displaySelect">1. Select Target Screen:</label>
        <select id="displaySelect">
            <option value="">Loading screens...</option>
        </select>

        <label for="mediaFile">2. Select Video or Image:</label>
        <input type="file" id="mediaFile" accept="video/mp4, image/jpeg, image/png">

        <button onclick="uploadAd()">Push to Screen</button>

        <p id="status"></p>
    </div>

    <script>
        // Replace with your local IP
        const SERVER_URL = 'http://192.168.1.13:3000';

        // Load paired screens into the dropdown
        window.onload = function() {
            fetch(SERVER_URL + '/api/displays')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('displaySelect');
                    select.innerHTML = ''; 
                    
                    if (data.displays.length === 0) {
                        select.innerHTML = '<option value="">No paired screens found</option>';
                        return;
                    }

                    data.displays.forEach(display => {
                        const option = document.createElement('option');
                        option.value = display.id;
                        // In the future, you can use display_name here instead of ID
                        option.textContent = `Screen ID: ${display.id}`; 
                        select.appendChild(option);
                    });
                })
                .catch(err => console.error("Error loading displays", err));
        }

        // Handle the upload
        function uploadAd() {
            const displayId = document.getElementById('displaySelect').value;
            const fileInput = document.getElementById('mediaFile');
            const statusText = document.getElementById('status');

            if (!displayId || fileInput.files.length === 0) {
                statusText.innerText = "❌ Please select a screen and a file.";
                statusText.style.color = "red";
                return;
            }

            statusText.innerText = "⏳ Uploading...";
            statusText.style.color = "black";

            // Prepare the file to be sent via POST
            const formData = new FormData();
            formData.append('displayId', displayId);
            formData.append('mediaFile', fileInput.files[0]);

            fetch(SERVER_URL + '/api/upload', {
                method: 'POST',
                body: formData 
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusText.innerText = "✅ Upload Successful!";
                    statusText.style.color = "green";
                    fileInput.value = ""; // Clear the input
                } else {
                    statusText.innerText = "❌ Error: " + data.message;
                    statusText.style.color = "red";
                }
            })
            .catch(error => {
                statusText.innerText = "❌ Network Error.";
                statusText.style.color = "red";
            });
        }
    </script>
</body>
</html>
