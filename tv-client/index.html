<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Display</title>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* The QR Code Pairing Screen */
        #pairing-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; background: #1a1a2e; }
        #qrcode { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { font-size: 3rem; margin: 0; }
        p { font-size: 1.5rem; color: #aaa; }

        /* The Media Player Screen */
        #media-screen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; background: black; }
        #ad-video, #ad-image { max-width: 100%; max-height: 100%; display: none; }
        
        /* Default logo if playlist is empty */
        #waiting-msg { display: none; font-size: 2rem; color: #555; }
    </style>
</head>
<body>

    <div id="pairing-screen">
        <div id="qrcode"></div>
        <h1>Scan to Link Display</h1>
        <p id="code-text">Connecting to server...</p>
    </div>

    <div id="media-screen">
        <video id="ad-video" autoplay muted></video>
        <img id="ad-image" src="" alt="Advertisement">
        <h2 id="waiting-msg">Ashok Jewellers - Waiting for ads...</h2>
    </div>

    <script>
        // ==========================================
        // PASTE YOUR RENDER URL RIGHT HERE:
        // ==========================================
        const SERVER_URL = 'https://digital-sinage.onrender.com';
        
        let displayId = null;
        let playlist = [];
        let currentAdIndex = 0;

        // Connect to your live Render server!
        const socket = io(SERVER_URL);

        // 1. Server sends the pairing code
        socket.on('pairing_code', (data) => {
            document.getElementById('code-text').innerText = "Code: " + data.code;
            document.getElementById('qrcode').innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), {
                text: data.code,
                width: 250,
                height: 250
            });
        });

        // 2. Phone successfully pairs the screen
        socket.on('paired_success', (data) => {
            displayId = data.displayId;
            document.getElementById('pairing-screen').style.display = 'none';
            document.getElementById('media-screen').style.display = 'flex';
            fetchPlaylist(); // Immediately look for ads
        });

        // 3. Phone uploaded a new ad! Server says to refresh.
        socket.on('update_playlist', () => {
            console.log("New ad received! Refreshing playlist...");
            fetchPlaylist();
        });

        // --- MEDIA PLAYER LOGIC ---

        function fetchPlaylist() {
            fetch(`${SERVER_URL}/api/playlist/${displayId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        playlist = data.playlist;
                        currentAdIndex = 0; // Reset to the start
                        playNextAd();
                    }
                })
                .catch(err => console.error("Could not load playlist:", err));
        }

        function playNextAd() {
            const videoEl = document.getElementById('ad-video');
            const imgEl = document.getElementById('ad-image');
            const waitingEl = document.getElementById('waiting-msg');

            // Hide everything first
            videoEl.style.display = 'none';
            imgEl.style.display = 'none';
            waitingEl.style.display = 'none';

            // If no ads, show the waiting logo
            if (playlist.length === 0) {
                waitingEl.style.display = 'block';
                return;
            }

            // Get the current ad
            const ad = playlist[currentAdIndex];
            const fullMediaUrl = SERVER_URL + ad.media_url;

            if (ad.media_type === 'video') {
                videoEl.src = fullMediaUrl;
                videoEl.style.display = 'block';
                videoEl.play();
                
                // When video ends, go to the next ad
                videoEl.onended = () => {
                    currentAdIndex = (currentAdIndex + 1) % playlist.length;
                    playNextAd();
                };
            } 
            else if (ad.media_type === 'image') {
                imgEl.src = fullMediaUrl;
                imgEl.style.display = 'block';
                
                // Show image for 8 seconds, then go to the next ad
                setTimeout(() => {
                    currentAdIndex = (currentAdIndex + 1) % playlist.length;
                    playNextAd();
                }, 8000); 
            }
        }
    </script>
</body>
</html>
