<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Jewellers - Display</title>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* The QR Code Pairing Screen */
        #pairing-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; background: #1a1a2e; }
        #qrcode { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { font-size: 3rem; margin: 0; text-align: center; }
        p { font-size: 1.5rem; color: #aaa; margin-top: 10px; }

        /* The Media Player Screen */
        #media-screen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; background: black; }
        #ad-video, #ad-image { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        
        /* Default logo if playlist is empty or nothing is scheduled */
        #waiting-msg { display: none; font-size: 2.5rem; color: #888; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="pairing-screen">
        <div id="qrcode"></div>
        <h1>Ashok Jewellers</h1>
        <p id="code-text">Connecting to server...</p>
    </div>

    <div id="media-screen">
        <video id="ad-video" autoplay muted></video>
        <img id="ad-image" src="" alt="Advertisement">
        <h2 id="waiting-msg">Ashok Jewellers<br><span style="font-size: 1.5rem;">Awaiting Scheduled Broadcast...</span></h2>
    </div>

    <script>
        // ==========================================
        // PASTE YOUR RENDER URL RIGHT HERE:
        // ==========================================
        const SERVER_URL = 'https://digital-sinage.onrender.com'; 
        
        // 1. Check TV Memory for existing pairing
        let displayId = localStorage.getItem('signage_display_id');
        let playlist = [];
        let currentAdIndex = 0;

        const socket = io(SERVER_URL);

        // --- CONNECTION LOGIC ---

        // When connecting to the server...
        socket.on('connect', () => {
            // If the TV remembers who it is, silently reconnect and skip the QR code
            if (displayId) {
                document.getElementById('pairing-screen').style.display = 'none';
                document.getElementById('media-screen').style.display = 'flex';
                
                fetch(`${SERVER_URL}/api/reconnect`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayId: displayId, socketId: socket.id })
                }).then(() => fetchPlaylist());
            }
        });

        // If the TV has no memory, show the QR code
        socket.on('pairing_code', (data) => {
            if (!displayId) {
                document.getElementById('code-text').innerText = "Scan to Link Display | Code: " + data.code;
                document.getElementById('qrcode').innerHTML = ""; 
                new QRCode(document.getElementById("qrcode"), { text: data.code, width: 250, height: 250 });
            }
        });

        // When the phone successfully scans the QR code
        socket.on('paired_success', (data) => {
            displayId = data.displayId;
            localStorage.setItem('signage_display_id', displayId); // Save to memory!
            document.getElementById('pairing-screen').style.display = 'none';
            document.getElementById('media-screen').style.display = 'flex';
            fetchPlaylist();
        });

        // When the admin clicks "Logout" from their phone
        socket.on('force_logout', () => {
            localStorage.removeItem('signage_display_id'); // Wipe memory
            location.reload(); // Refresh to show QR code again
        });

        // When the admin uploads a new ad
        socket.on('update_playlist', () => {
            console.log("Playlist update received!");
            fetchPlaylist();
        });


        // --- MEDIA PLAYER LOGIC ---

        function fetchPlaylist() {
            fetch(`${SERVER_URL}/api/playlist/${displayId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        playlist = data.playlist;
                        currentAdIndex = 0;
                        playNextAd();
                    }
                })
                .catch(err => console.error("Could not fetch playlist", err));
        }

        // Checks if an ad is allowed to play right now based on its schedule
        function isAdActive(ad) {
            // If no schedule was set, play it all the time
            if (!ad.start_date && !ad.start_time) return true; 
            
            const now = new Date();
            
            // Format dates locally (YYYY-MM-DD) and time (HH:MM)
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const todayStr = `${year}-${month}-${day}`;
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${hours}:${minutes}`;
            
            // Check Dates
            if (ad.start_date && todayStr < ad.start_date) return false;
            if (ad.end_date && todayStr > ad.end_date) return false;
            
            // Check Times
            if (ad.start_time && timeStr < ad.start_time) return false;
            if (ad.end_time && timeStr > ad.end_time) return false;
            
            return true; // Passed all checks!
        }

        function playNextAd() {
            const videoEl = document.getElementById('ad-video');
            const imgEl = document.getElementById('ad-image');
            const waitingEl = document.getElementById('waiting-msg');

            // Hide everything first
            videoEl.style.display = 'none';
            imgEl.style.display = 'none';
            waitingEl.style.display = 'none';

            let attempts = 0;
            let activeAd = null;
            
            // Look through the playlist for an ad that matches the current date/time
            while (attempts < playlist.length) {
                const potentialAd = playlist[currentAdIndex];
                if (isAdActive(potentialAd)) {
                    activeAd = potentialAd;
                    break;
                }
                // If not active, skip to the next one
                currentAdIndex = (currentAdIndex + 1) % playlist.length;
                attempts++;
            }

            // If no ads are scheduled right now, show the waiting message and check again in 10 seconds
            if (!activeAd) {
                waitingEl.style.display = 'block';
                setTimeout(playNextAd, 10000); 
                return;
            }

            const fullMediaUrl = SERVER_URL + activeAd.media_url;

            if (activeAd.media_type === 'video') {
                videoEl.src = fullMediaUrl;
                videoEl.style.display = 'block';
                
                // Play the video. If the browser blocks autoplay, it logs the error quietly.
                videoEl.play().catch(e => console.log("Autoplay blocked by browser."));
                
                // When video ends, move to the next ad
                videoEl.onended = () => {
                    currentAdIndex = (currentAdIndex + 1) % playlist.length;
                    playNextAd();
                };
            } 
            else if (activeAd.media_type === 'image') {
                imgEl.src = fullMediaUrl;
                imgEl.style.display = 'block';
                
                // Show the image for 8 seconds, then move to the next ad
                setTimeout(() => {
                    currentAdIndex = (currentAdIndex + 1) % playlist.length;
                    playNextAd();
                }, 8000); 
            }
        }
    </script>
</body>
</html>
